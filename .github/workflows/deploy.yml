name: Hub of Heroes CI/CD

on:
  push:
    branches: [ main ]

# Grant permissions for GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  # 1. Build and push container images
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Convert repository name to lowercase
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Inject Version into HTML
        run: |
          sed -i "s/BUILD_VERSION/${GITHUB_SHA::7}/g" app/frontend/index.html

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./app/backend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./app/frontend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/frontend:latest

  # 2. Provision Infrastructure and Configure Server
  provision-infra:
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      public_ip: ${{ steps.terraform.outputs.PUBLIC_IP }}
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init & Apply
        id: terraform
        run: |
          cd terraform
          terraform init -backend-config="key=${{ github.event.repository.name }}.tfstate"
          terraform apply -auto-approve \
            -var="resource_group_name=rg-${{ github.event.repository.name }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
          echo "PUBLIC_IP=$(terraform output -raw public_ip_address)" >> $GITHUB_OUTPUT

      - name: Setup Ansible
        run: pip install ansible

      - name: Run Ansible Playbook
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          sleep 15
          ansible-playbook -i "${{ steps.terraform.outputs.PUBLIC_IP }}," \
            -u starkadmin --private-key private_key.pem \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            ansible/playbook.yml

  # 3. Deploy Application and Health Check
  deploy-app:
    needs: [build-and-push, provision-infra]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Convert repository name to lowercase
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Deploy to Server
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          
          # Copy docker-compose.yml
          scp -o StrictHostKeyChecking=no -i private_key.pem app/docker-compose.yml starkadmin@${{ needs.provision-infra.outputs.public_ip }}:~/docker-compose.yml
          
          # Execute Deployment via Docker Swarm
          ssh -o StrictHostKeyChecking=no -i private_key.pem starkadmin@${{ needs.provision-infra.outputs.public_ip }} "
            # Login to GHCR (required for Swarm to pull images)
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Deploy or update the stack
            export REPO_NAME=${{ env.REPO_LOWER }}
            
            # 1. Force pull the latest images first
            docker compose pull
            
            # 2. Deploy/Update the stack
            docker stack deploy -c ~/docker-compose.yml stark-app --with-registry-auth --prune

            # 3. Force Update to ensure services pull the fresh image even if tag is the same
            echo "Forcing service updates..."
            docker service update --image ghcr.io/${REPO_NAME}/frontend:latest --force stark-app_frontend
            docker service update --image ghcr.io/${REPO_NAME}/backend:latest --force stark-app_backend
            
            # Wait for the service to be stable (Zero Downtime in progress)
            echo 'Deployment ongoing (Swarm is handling the rolling update)...'
            sleep 30
            
            # Final Status Check
            if ! docker stack ps stark-app | grep -E 'Running|Complete'; then
              echo 'ALERT: Deployment state looks unstable!'
              exit 1
            fi
            echo 'Deployment successful and stable!'
          "

name: Hub of Heroes CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # 0. Check what has changed
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v3
      - name: Check for changes in infra or app
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            infra:
              - 'terraform/**'
              - 'ansible/**'
            app:
              - 'app/**'
              - '.github/workflows/deploy.yml'

  # 1. Build and push container images (Run if app files changed)
  build-and-push:
    needs: check-changes
    if: needs.check-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Convert repository name to lowercase
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Inject Version into HTML
        run: |
          sed -i "s/BUILD_VERSION/${GITHUB_SHA::7}/g" app/frontend/index.html

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./app/backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/backend:latest
            ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./app/frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
            ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}

  # 2. Provision Infrastructure (Run ONLY if infra files changed)
  provision-infra:
    needs: check-changes
    if: needs.check-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init -backend-config="key=${{ github.event.repository.name }}.tfstate"
          terraform apply -auto-approve \
            -var="resource_group_name=rg-${{ github.event.repository.name }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Setup Ansible
        run: pip install ansible

      - name: Run Ansible Playbook
        run: |
          cd terraform
          PUBLIC_IP=$(terraform output -raw public_ip_address)
          cd ..
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          sleep 15
          ansible-playbook -i "$PUBLIC_IP," \
            -u starkadmin --private-key private_key.pem \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            ansible/playbook.yml

  # 3. Deploy Application (Always run if app changed)
  deploy-app:
    needs: [check-changes, build-and-push, provision-infra]
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Convert repository name to lowercase
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Get Public IP (Fast)
        id: infra_info
        run: |
          cd terraform
          terraform init -backend-config="key=${{ github.event.repository.name }}.tfstate"
          echo "PUBLIC_IP=$(terraform output -raw public_ip_address)" >> $GITHUB_OUTPUT

      - name: Deploy to Server
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          
          # Inject identifiers
          sed -i "s|\${REPO_NAME}|${{ env.REPO_LOWER }}|g" app/docker-compose.yml
          sed -i "s|:latest|:${{ github.sha }}|g" app/docker-compose.yml
          
          # Copy injected docker-compose.yml
          scp -o StrictHostKeyChecking=no -i private_key.pem app/docker-compose.yml starkadmin@${{ steps.infra_info.outputs.PUBLIC_IP }}:~/docker-compose.yml
          
          # Execute Deployment
          ssh -o StrictHostKeyChecking=no -i private_key.pem starkadmin@${{ steps.infra_info.outputs.PUBLIC_IP }} "
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stack deploy -c ~/docker-compose.yml stark-app --with-registry-auth --prune
            echo 'Deployment ongoing...'
            sleep 30
            
            # --- Smart Status Report ---
            SERVICES=\"stark-app_frontend stark-app_backend\"
            for SERVICE in \$SERVICES; do
              STATE=\$(docker service inspect \$SERVICE --format '{{.UpdateStatus.State}}' 2>/dev/null || echo \"none\")
              if [ \"\$STATE\" == \"rollback_completed\" ]; then
                echo \"❌ ALERT: \$SERVICE Update FAILED! (Rolled back)\"
              elif [ \"\$STATE\" == \"completed\" ] || [ \"\$STATE\" == \"\" ] || [ \"\$STATE\" == \"none\" ]; then
                echo \"✅ SUCCESS: \$SERVICE is updated.\"
              fi
            done
          "

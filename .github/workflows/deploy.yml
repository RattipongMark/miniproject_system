name: Hub of Heroes CI/CD

on:
  push:
    branches: [ main ]

# Grant permissions for GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  # 1. Build and push container images
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Convert repository name to lowercase
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Inject Version into HTML
        run: |
          sed -i "s/BUILD_VERSION/${GITHUB_SHA::7}/g" app/frontend/index.html

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./app/backend
          push: true
          # Use both 'latest' and 'commit sha' tags
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/backend:latest
            ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./app/frontend
          push: true
          # Use both 'latest' and 'commit sha' tags
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
            ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}

  # 2. Provision Infrastructure and Configure Server
  provision-infra:
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      public_ip: ${{ steps.terraform.outputs.PUBLIC_IP }}
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init & Apply
        id: terraform
        run: |
          cd terraform
          terraform init -backend-config="key=${{ github.event.repository.name }}.tfstate"
          terraform apply -auto-approve \
            -var="resource_group_name=rg-${{ github.event.repository.name }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
          echo "PUBLIC_IP=$(terraform output -raw public_ip_address)" >> $GITHUB_OUTPUT

      - name: Setup Ansible
        run: pip install ansible

      - name: Run Ansible Playbook
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          sleep 15
          ansible-playbook -i "${{ steps.terraform.outputs.PUBLIC_IP }}," \
            -u starkadmin --private-key private_key.pem \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            ansible/playbook.yml

  # 3. Deploy Application and Health Check
  deploy-app:
    needs: [build-and-push, provision-infra]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Convert repository name to lowercase
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Deploy to Server
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          
          # Inject the REAL image tag into docker-compose before sending
          sed -i "s|\${REPO_NAME}|${{ env.REPO_LOWER }}|g" app/docker-compose.yml
          sed -i "s|:latest|:${{ github.sha }}|g" app/docker-compose.yml
          
          # Copy injected docker-compose.yml
          scp -o StrictHostKeyChecking=no -i private_key.pem app/docker-compose.yml starkadmin@${{ needs.provision-infra.outputs.public_ip }}:~/docker-compose.yml
          
          # Execute Deployment
          ssh -o StrictHostKeyChecking=no -i private_key.pem starkadmin@${{ needs.provision-infra.outputs.public_ip }} "
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stack deploy -c ~/docker-compose.yml stark-app --with-registry-auth --prune
            
            echo 'Deployment ongoing (Swarm is handling the rolling update)...'
            sleep 40
            
            # --- Smart Status Report ---
            echo '--- Deployment Report ---'
            SERVICES=("stark-app_frontend" "stark-app_backend")
            for SERVICE in "${SERVICES[@]}"; do
              STATE=$(docker service inspect $SERVICE --format '{{.UpdateStatus.State}}')
              if [ "$STATE" == "rollback_completed" ]; then
                echo "❌ ALERT: $SERVICE Update FAILED! (Rolled back to previous version)"
              elif [ "$STATE" == "completed" ] || [ "$STATE" == "" ] || [ "$STATE" == "none" ]; then
                echo "✅ SUCCESS: $SERVICE is healthy and running the new version."
              else
                echo "⚠️ WARNING: $SERVICE state is $STATE. Please check manually."
              fi
            done
            
            if ! docker stack ps stark-app | grep -E 'Running|Complete'; then
              echo 'ERROR: Stack state looks unstable!'
              exit 1
            fi
            echo '--- End of Report ---'
          "

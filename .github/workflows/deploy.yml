name: Hub of Heroes CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # 0. Check changes and infra status
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      infra_needed: ${{ steps.decide.outputs.infra_needed }}
      app_needed: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v3
      - name: Check for file changes
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            infra_files:
              - 'terraform/**'
              - 'ansible/**'
            app:
              - 'app/**'
              - '.github/workflows/deploy.yml'
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Check Azure Status
        id: azure_check
        run: |
          EXISTS=$(az group exists --name "rg-${{ github.event.repository.name }}")
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
      - name: Decide
        id: decide
        run: |
          if [ "${{ steps.filter.outputs.infra_files }}" == "true" ] || [ "${{ steps.azure_check.outputs.exists }}" == "false" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "infra_needed=true" >> $GITHUB_OUTPUT
          else
            echo "infra_needed=false" >> $GITHUB_OUTPUT
          fi

  # 1. Build and push (ALWAYS RUN for SHA consistency)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Convert repository name to lowercase
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Inject Version into HTML
        run: |
          sed -i "s/BUILD_VERSION/${GITHUB_SHA::7}/g" app/frontend/index.html
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./app/backend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./app/frontend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}

  # 2. Provision Infrastructure
  provision-infra:
    needs: check-changes
    if: needs.check-changes.outputs.infra_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Apply
        run: |
          cd terraform
          terraform init -backend-config="key=${{ github.event.repository.name }}.tfstate"
          terraform apply -auto-approve -var="resource_group_name=rg-${{ github.event.repository.name }}" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
      - name: Setup Ansible
        run: pip install ansible
      - name: Run Playbook
        run: |
          PUBLIC_IP=$(cd terraform && terraform output -raw public_ip_address)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ansible-playbook -i "$PUBLIC_IP," -u starkadmin --private-key private_key.pem -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" ansible/playbook.yml

  # 3. Deploy Application
  deploy-app:
    needs: [build-and-push, provision-infra, check-changes]
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Convert repository name to lowercase
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false
      - name: Get IP
        id: ip
        run: |
          cd terraform
          terraform init -backend-config="key=${{ github.event.repository.name }}.tfstate"
          echo "PUBLIC_IP=$(terraform output -raw public_ip_address)" >> $GITHUB_OUTPUT
      - name: Deploy
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          sed -i "s|\${REPO_NAME}|${{ env.REPO_LOWER }}|g" app/docker-compose.yml
          sed -i "s|:latest|:${{ github.sha }}|g" app/docker-compose.yml
          scp -o StrictHostKeyChecking=no -i private_key.pem app/docker-compose.yml starkadmin@${{ steps.ip.outputs.PUBLIC_IP }}:~/docker-compose.yml
          ssh -o StrictHostKeyChecking=no -i private_key.pem starkadmin@${{ steps.ip.outputs.PUBLIC_IP }} "
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stack deploy -c ~/docker-compose.yml stark-app --with-registry-auth --prune
            echo 'Deployment success. Check your site!'
          "

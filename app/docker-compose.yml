version: '3.8'

networks:
  public:
    driver: overlay

services:
  traefik:
    image: traefik:v2.10
    command:
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    # --- เพิ่มบรรทัดนี้เพื่อแก้ปัญหา API Version ---
    environment:
      - DOCKER_API_VERSION=1.41
    networks:
      - public
    deploy:
      placement:
        constraints:
          - node.role == manager

  frontend:
    image: ghcr.io/${REPO_NAME}/frontend:latest
    networks:
      - public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
        - "traefik.http.routers.frontend.entrypoints=web"
        - "traefik.http.services.frontend.loadbalancer.server.port=80"

  backend:
    image: ghcr.io/${REPO_NAME}/backend:latest
    environment:
      - REDIS_HOST=db
    networks:
      - public
    deploy:
      replicas: 1

  db:
    image: redis:alpine
    networks:
      - public
    deploy:
      replicas: 1

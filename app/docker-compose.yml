version: '3.8'

services:
  frontend:
    image: ghcr.io/${REPO_NAME}/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    image: ghcr.io/${REPO_NAME}/backend:latest
    environment:
      - REDIS_HOST=db
    depends_on:
      - db
    restart: always

  db:
    image: redis:alpine
    restart: always
